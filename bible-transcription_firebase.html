<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 필사 · 잠언 & 시편</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Nanum+Myeongjo:wght@400;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── Firebase 설정 ──
  const firebaseConfig = {
    apiKey: "AIzaSyAW4m2p_PsnC2u4wXWiiF3EXFr7XF-YLIE",
    authDomain: "bible-writing-app.firebaseapp.com",
    projectId: "bible-writing-app",
    storageBucket: "bible-writing-app.firebasestorage.app",
    messagingSenderId: "88942192892",
    appId: "1:88942192892:web:389866b944fdbd9ede0f79"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // ── 전역에 노출 ──
  window._fbSignIn  = () => signInWithPopup(auth, provider);
  window._fbSignOut = () => signOut(auth);

  window._fbSave = async (state) => {
    if (!currentUser) return;
    await setDoc(doc(db, "users", currentUser.uid), { state: JSON.stringify(state) });
  };

  window._fbLoad = async () => {
    if (!currentUser) return null;
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    if (snap.exists()) {
      try { return JSON.parse(snap.data().state); } catch { return null; }
    }
    return null;
  };

  // ── 인증 상태 감지 ──
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      // 로그인됨
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
      document.getElementById('userInfo').innerHTML =
        `<img src="${user.photoURL}" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-right:6px;">` +
        `<span style="font-size:12px;color:#a08060;">${user.displayName}</span>` +
        `<button onclick="window._fbSignOut()" style="margin-left:10px;background:none;border:1px solid #3a2a1a;color:#5a4a32;font-size:11px;padding:3px 10px;cursor:pointer;font-family:'Noto Serif KR',serif;letter-spacing:1px;">로그아웃</button>`;
      // 클라우드에서 데이터 불러오기
      const cloudState = await window._fbLoad();
      if (cloudState) {
        window._initApp(cloudState);
      } else {
        window._initApp(null);
      }
    } else {
      // 로그아웃됨
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appContainer').style.display = 'none';
    }
  });
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1c1810;
  --surface: #f7f2e8;
  --surface2: #ede6d6;
  --ink: #1e160a;
  --ink2: #5a4a32;
  --ink3: #a08060;
  --divider: #d0c0a0;
  --red: #7a1c1c;
  --blue: #1a3558;
  --gold: #c8960c;
  --line: #ddd0b8;
  --sidebar-w: 260px;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  height: 100vh;
}

/* ══════════════ SIDEBAR ══════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: #120f09;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid #2a2010;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid #2a2010;
}

.app-title {
  font-family: 'IM Fell English SC', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 4px;
}

.app-sub {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 18px;
  font-weight: 700;
  color: #f0e8d8;
  letter-spacing: -0.5px;
}

/* Book tabs */
.book-tabs {
  display: flex;
  border-bottom: 1px solid #2a2010;
}

.book-tab {
  flex: 1;
  padding: 10px 0;
  background: none;
  border: none;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 13px;
  font-weight: 700;
  color: #5a4a32;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  position: relative;
}

.book-tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 2px;
  transform: scaleX(0);
  transition: transform 0.2s;
}

.book-tab.active { color: #f0e8d8; }
.book-tab.active::after { transform: scaleX(1); }
.book-tab.proverbs.active::after { background: var(--red); }
.book-tab.psalms.active::after   { background: #4a7ab8; }

/* Chapter list */
.chapter-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.chapter-list::-webkit-scrollbar { width: 4px; }
.chapter-list::-webkit-scrollbar-track { background: transparent; }
.chapter-list::-webkit-scrollbar-thumb { background: #3a2a1a; border-radius: 2px; }

.chapter-item {
  display: flex;
  align-items: center;
  padding: 9px 18px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px;
}

.chapter-item:hover { background: rgba(255,255,255,0.04); }
.chapter-item.active { background: rgba(255,255,255,0.08); }

.chapter-num {
  font-family: 'IM Fell English SC', serif;
  font-size: 12px;
  color: #5a4a32;
  min-width: 28px;
}

.chapter-item.active .chapter-num { color: var(--gold); }

.chapter-name {
  font-size: 13px;
  color: #8a7060;
  flex: 1;
}

.chapter-item.active .chapter-name { color: #d8c8a8; }

.chapter-done {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #2a2010;
  flex-shrink: 0;
  transition: background 0.3s;
}

.chapter-item[data-done="true"] .chapter-done { background: var(--gold); }

/* Stats bar */
.sidebar-stats {
  padding: 12px 18px;
  border-top: 1px solid #2a2010;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stat-item { text-align: center; }
.stat-num {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  display: block;
}
.stat-label { font-size: 10px; color: #5a4a32; letter-spacing: 1px; }

/* ══════════════ MAIN ══════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}

/* Chapter header bar */
.chapter-header {
  background: var(--surface2);
  border-bottom: 2px solid var(--divider);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.chapter-title-block { display: flex; align-items: baseline; gap: 12px; }

.chapter-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--red);
}

.chapter-label.psalms { color: #4a7ab8; }

.chapter-full-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
}

.chapter-verse-count {
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 1px;
}

.header-actions { display: flex; align-items: center; gap: 12px; }

.nav-chap {
  background: none;
  border: 1px solid var(--divider);
  color: var(--ink2);
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}

.nav-chap:hover:not(:disabled) { background: var(--ink); color: var(--surface); border-color: var(--ink); }
.nav-chap:disabled { opacity: 0.3; cursor: default; }

.complete-btn {
  background: var(--ink);
  color: var(--surface);
  border: none;
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  padding: 7px 20px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.complete-btn::before {
  content: '';
  position: absolute; inset: 0;
  transform: translateX(-100%);
  transition: transform 0.3s;
}

.complete-btn:hover::before { transform: translateX(0); }
.complete-btn span { position: relative; z-index: 1; }

.complete-btn.proverbs::before { background: var(--red); }
.complete-btn.psalms::before   { background: #1a3558; }
.complete-btn.done { background: var(--red); }
.complete-btn.done.psalms { background: #1a3558; }
.complete-btn:focus { outline: 2px solid var(--gold); outline-offset: 2px; }

/* ══════════════ SPLIT PANE ══════════════ */
.split-pane {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Left: original text */
.pane-original {
  width: 50%;
  border-right: 2px solid var(--divider);
  overflow-y: auto;
  padding: 28px 32px;
  background: var(--surface);
}

.pane-original::-webkit-scrollbar { width: 4px; }
.pane-original::-webkit-scrollbar-track { background: transparent; }
.pane-original::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

.pane-label {
  font-family: 'IM Fell English SC', serif;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--ink3);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.pane-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

.verse-row {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
  align-items: flex-start;
  padding: 8px 10px;
  border-radius: 2px;
  transition: background 0.15s;
}

.verse-row:hover { background: rgba(0,0,0,0.03); }

/* 필사 완료된 절 — 원문 표시 */
.verse-row.typed .v-text {
  color: var(--ink3);
  transition: color 0.3s;
}
.verse-row.typed .v-num { opacity: 0.45; transition: opacity 0.3s; }

.verse-row.typed-psalms .v-text {
  color: #7a9ec0;
  transition: color 0.3s;
}
.verse-row.typed-psalms .v-num { opacity: 0.45; transition: opacity 0.3s; }

/* 현재 타이핑 중인 절 — 살짝 하이라이트 */
.verse-row.active-verse {
  background: rgba(184, 134, 11, 0.07);
  border-left: 2px solid var(--gold);
  padding-left: 8px;
}

.v-num {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--red);
  min-width: 28px;
  padding-top: 3px;
  text-align: right;
  flex-shrink: 0;
  opacity: 0.85;
}

.v-num.psalms { color: #4a7ab8; }

.v-text {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  line-height: 1.9;
  color: var(--ink);
}

/* Right: writing pane */
.pane-writing {
  width: 50%;
  overflow-y: auto;
  padding: 28px 32px;
  background: #fdfaf4;
}

.pane-writing::-webkit-scrollbar { width: 4px; }
.pane-writing::-webkit-scrollbar-track { background: transparent; }
.pane-writing::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

.write-verse-row {
  margin-bottom: 18px;
}

.write-num {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink3);
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.write-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  outline: none;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  line-height: 1.9;
  color: var(--ink);
  padding: 4px 2px 6px;
  resize: none;
  transition: border-color 0.2s;
  caret-color: var(--red);
  overflow: hidden;
}

.write-input:focus { border-bottom-color: var(--red); }
.write-input.psalms:focus { border-bottom-color: #4a7ab8; }

.write-input::placeholder { color: #c8b898; font-style: italic; }

/* Reset button */
.sidebar-reset {
  padding: 10px 14px 14px;
  border-top: 1px solid #2a2010;
}

.reset-btn {
  width: 100%;
  background: none;
  border: 1px solid #3a2a1a;
  color: #5a4a32;
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  padding: 7px 0;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}

.reset-btn:hover {
  border-color: #8b2020;
  color: #c07070;
}

/* Confirm modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.show { opacity: 1; pointer-events: all; }

.modal {
  background: #1c1810;
  border: 1px solid #3a2a1a;
  padding: 32px 36px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  transform: translateY(12px);
  transition: transform 0.2s;
}

.modal-overlay.show .modal { transform: translateY(0); }

.modal-icon { font-size: 28px; margin-bottom: 12px; }

.modal-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 17px;
  font-weight: 700;
  color: #f0e8d8;
  margin-bottom: 8px;
}

.modal-desc {
  font-size: 12px;
  color: #5a4a32;
  line-height: 1.7;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.modal-actions { display: flex; gap: 10px; justify-content: center; }

.modal-btn {
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  padding: 8px 22px;
  cursor: pointer;
  letter-spacing: 1px;
  border: none;
  transition: all 0.15s;
}

.modal-btn.cancel {
  background: none;
  border: 1px solid #3a2a1a;
  color: #5a4a32;
}

.modal-btn.cancel:hover { border-color: #5a4a32; color: #8a7060; }

.modal-btn.confirm {
  background: #8b2020;
  color: #f0e8d8;
}

.modal-btn.confirm:hover { background: #a03030; }

/* Sync scroll toggle */
.sync-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--ink3);
  cursor: pointer;
  user-select: none;
}

.toggle-box {
  width: 14px; height: 14px;
  border: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: var(--red);
  transition: all 0.2s;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--ink);
  color: var(--surface);
  padding: 9px 22px;
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  letter-spacing: 1px;
  transition: transform 0.3s ease;
  z-index: 200;
  pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--ink3);
  gap: 8px;
}

.empty-state .icon { font-size: 32px; opacity: 0.4; }
.empty-state p { font-size: 13px; letter-spacing: 1px; }

/* ── 로그인 화면 ── */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 20px;
}
.login-title {
  font-family: 'IM Fell English SC', serif;
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--gold);
  margin-bottom: 4px;
}
.login-sub {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 26px;
  font-weight: 700;
  color: #f0e8d8;
  margin-bottom: 32px;
}
.login-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #f0e8d8;
  border: none;
  padding: 13px 28px;
  cursor: pointer;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  font-weight: 600;
  color: #1e160a;
  letter-spacing: 1px;
  transition: background 0.2s;
}
.login-btn:hover { background: #fff; }
.login-btn img { width: 20px; height: 20px; }
.login-desc {
  font-size: 12px;
  color: #5a4a32;
  letter-spacing: 1px;
  margin-top: 8px;
}
#appContainer { display: none; width: 100%; height: 100%; }
#userInfo {
  display: flex;
  align-items: center;
  gap: 2px;
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar { width: 200px; }
  :root { --sidebar-w: 200px; }
  .pane-original, .pane-writing { padding: 18px 16px; }
  .v-text, .write-input { font-size: 14px; }
}

@media (max-width: 560px) {
  .sidebar { display: none; }
  .split-pane { flex-direction: column; }
  .pane-original { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid var(--divider); }
  .pane-writing { width: 100%; height: 60%; }
}
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginScreen">
  <div class="login-title">개역개정</div>
  <div class="login-sub">성경 필사</div>
  <button class="login-btn" onclick="window._fbSignIn()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Google 계정으로 시작하기
  </button>
  <div class="login-desc">로그인하면 어떤 기기에서도 필사 기록이 이어집니다</div>
</div>

<!-- ── 앱 본체 ── -->
<div id="appContainer">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="app-title">개역개정</div>
    <div class="app-sub">성경 필사</div>
  </div>

  <div class="book-tabs">
    <button class="book-tab proverbs active" onclick="setBook('proverbs')">잠언</button>
    <button class="book-tab psalms"          onclick="setBook('psalms')">시편</button>
  </div>

  <div class="chapter-list" id="chapterList"></div>

  <div class="sidebar-stats">
    <div class="stat-item">
      <span class="stat-num" id="statStreak">0</span>
      <span class="stat-label">연속 일수</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statDone">0</span>
      <span class="stat-label">완료 장</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statTotal">0</span>
      <span class="stat-label">전체 장</span>
    </div>
  </div>
  <div class="sidebar-reset">
    <button class="reset-btn" onclick="confirmReset()">↺ 전체 초기화</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="chapter-header">
    <div class="chapter-title-block">
      <span class="chapter-label" id="chapLabel">PROVERBS</span>
      <span class="chapter-full-title" id="chapTitle">잠언 1장</span>
      <span class="chapter-verse-count" id="chapVerseCount"></span>
    </div>
    <div class="header-actions">
      <div id="userInfo"></div>
      <label class="sync-toggle" title="동시 스크롤">
        <div class="toggle-box" id="syncBox">✓</div>
        동시스크롤
      </label>
      <button class="nav-chap" id="prevChap" onclick="moveChapter(-1)">← 이전장</button>
      <button class="nav-chap" id="nextChap" onclick="moveChapter(1)">다음장 →</button>
      <button class="complete-btn proverbs" id="completeBtn" onclick="completeChapter()">
        <span id="completeBtnText">장 완료</span>
      </button>
    </div>
  </div>

  <div class="split-pane">
    <!-- Original -->
    <div class="pane-original" id="paneOriginal">
      <div class="pane-label">원문</div>
      <div id="originalVerses"></div>
    </div>

    <!-- Writing -->
    <div class="pane-writing" id="paneWriting">
      <div class="pane-label">필사</div>
      <div id="writingVerses"></div>
    </div>
  </div>
</div>

<!-- Confirm reset modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <div class="modal-icon">✦</div>

// ══════════════════════════
// STATE
// ══════════════════════════
const KEY = 'bible-v3';
function fresh() {
  return { book: 'proverbs', chapIdx: { proverbs: 0, psalms: 0 }, done: { proverbs: {}, psalms: {} }, drafts: { proverbs: {}, psalms: {} }, streak: 0, lastDate: null };
}

// 로컬 저장 (오프라인 백업용)
function saveLocal() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {} }

// Firebase + 로컬 동시 저장
function save() {
  saveLocal();
  if (window._fbSave) window._fbSave(state);
}

let state = fresh();
let syncScroll = true;

// 앱 초기화 함수 (Firebase 인증 후 호출)
window._initApp = function(cloudState) {
  if (cloudState) {
    state = cloudState;
  } else {
    // 클라우드 데이터 없으면 로컬 백업 시도
    try { state = JSON.parse(localStorage.getItem(KEY)) || fresh(); } catch { state = fresh(); }
  }
  document.querySelector('.book-tab.' + state.book).classList.add('active');
  if (state.book === 'psalms') {
    document.querySelector('.book-tab.proverbs').classList.remove('active');
  }
  renderChapterList();
  renderChapter();
};

function today() {
  return new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

// ══════════════════════════
// BOOK SWITCH
// ══════════════════════════
function setBook(b) {
  state.book = b;
  save();
  document.querySelectorAll('.book-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.book-tab.' + b).classList.add('active');
  renderChapterList();
  renderChapter();
}

// ══════════════════════════
// CHAPTER LIST
// ══════════════════════════
function renderChapterList() {
  const b = state.book;
  const chapters = BIBLE[b];
  const list = document.getElementById('chapterList');
  list.innerHTML = '';
  chapters.forEach((ch, idx) => {
    const done = !!state.done[b][idx];
    const active = idx === state.chapIdx[b];
    const item = document.createElement('div');
    item.className = 'chapter-item' + (active ? ' active' : '');
    item.dataset.done = done ? 'true' : 'false';
    item.innerHTML = `
      <span class="chapter-num">${ch.ch}</span>
      <span class="chapter-name">${ch.title}</span>
      <span class="chapter-done"></span>`;
    item.onclick = () => { state.chapIdx[b] = idx; save(); renderChapterList(); renderChapter(); };
    list.appendChild(item);
  });
  updateStats();
}

// ══════════════════════════
// CHAPTER RENDER
// ══════════════════════════
function renderChapter() {
  const b = state.book;
  const isPsalms = b === 'psalms';
  const chapters = BIBLE[b];
  const idx = state.chapIdx[b];
  const ch = chapters[idx];

  // Header
  document.getElementById('chapLabel').textContent = isPsalms ? 'PSALMS' : 'PROVERBS';
  document.getElementById('chapLabel').className = 'chapter-label' + (isPsalms ? ' psalms' : '');
  document.getElementById('chapTitle').textContent = ch.title;
  document.getElementById('chapVerseCount').textContent = `${ch.verses.length}절`;

  // Complete button
  const isDone = !!state.done[b][idx];
  const btn = document.getElementById('completeBtn');
  btn.className = 'complete-btn ' + b + (isDone ? ' done' : '');
  document.getElementById('completeBtnText').textContent = isDone ? '✓ 완료됨' : '장 완료';

  // Nav
  document.getElementById('prevChap').disabled = idx === 0;
  document.getElementById('nextChap').disabled = idx === chapters.length - 1;

  // Original verses
  const orig = document.getElementById('originalVerses');
  orig.innerHTML = '';
  ch.verses.forEach((v, i) => {
    const row = document.createElement('div');
    row.className = 'verse-row';
    row.innerHTML = `<span class="v-num${isPsalms ? ' psalms' : ''}">${i + 1}</span><span class="v-text">${v}</span>`;
    orig.appendChild(row);
  });

  // Writing verses
  const writing = document.getElementById('writingVerses');
  writing.innerHTML = '';
  const savedDrafts = state.drafts[b][idx] || {};
  ch.verses.forEach((v, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'write-verse-row';
    const ta = document.createElement('textarea');
    ta.className = 'write-input' + (isPsalms ? ' psalms' : '');
    ta.rows = 3;
ta.style.minHeight = '60px';
ta.style.overflow = 'hidden';
    ta.placeholder = `${i + 1}절을 필사하세요…`;
    ta.value = savedDrafts[i] || '';
    ta.dataset.verse = i;

    // Auto resize
    setTimeout(() => autoResize(ta), 0);
    ta.addEventListener('input', () => {
      autoResize(ta);
      if (!state.drafts[b][idx]) state.drafts[b][idx] = {};
      state.drafts[b][idx][i] = ta.value;
      save();
      updateVerseHighlight(b, idx);
    });

    // 포커스 시 해당 원문 절 active 표시
    ta.addEventListener('focus', () => updateActiveVerse(i));
    ta.addEventListener('blur',  () => updateActiveVerse(-1));

    // Enter → 다음 절로 이동
    // 쿨다운으로 IME 이중 발화 완전 차단
    let moveLocked = false;
    let enterPressed = false;

    const tryMove = () => {
      if (moveLocked) return;
      moveLocked = true;
      moveToNext(ta, b, idx, i);
      setTimeout(() => { moveLocked = false; }, 300);
    };

    ta.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (e.isComposing || ta.dataset.composing === '1') {
        enterPressed = true; // 조합 중 Enter → compositionend 후 이동
      } else {
        tryMove();
      }
    });

    ta.addEventListener('compositionstart', () => { ta.dataset.composing = '1'; });
    ta.addEventListener('compositionend', () => {
      ta.dataset.composing = '0';
      if (enterPressed) {
        enterPressed = false;
        requestAnimationFrame(tryMove); // 다음 프레임에 이동 (값 확정 후)
      }
    });

    const numEl = document.createElement('div');
    numEl.className = 'write-num';
    numEl.textContent = `— ${i + 1}절`;

    wrap.appendChild(numEl);
    wrap.appendChild(ta);
    writing.appendChild(wrap);
  });

  // Scroll to top
  document.getElementById('paneOriginal').scrollTop = 0;
  document.getElementById('paneWriting').scrollTop = 0;

  // 저장된 필사 내용으로 초기 하이라이트 적용
  updateVerseHighlight(b, idx);
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function moveToNext(ta, b, chapIdx, verseIdx) {
  const allInputs = document.querySelectorAll('.write-input');
  const currentPos = Array.from(allInputs).indexOf(ta);
  const nextTa = allInputs[currentPos + 1];

  // 현재 절 끝 공백 추가
  if (ta.value && !ta.value.endsWith(' ')) {
    ta.value += ' ';
    if (!state.drafts[b][chapIdx]) state.drafts[b][chapIdx] = {};
    state.drafts[b][chapIdx][verseIdx] = ta.value;
    save();
    updateVerseHighlight(b, chapIdx);
  }

  if (nextTa) {
    nextTa.focus();
    const len = nextTa.value.length;
    nextTa.setSelectionRange(len, len);
    nextTa.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    document.getElementById('completeBtn').focus();
  }
}

// 원문 패널의 각 절 색상을 필사 진행도에 맞게 업데이트
function updateVerseHighlight(b, chapIdx) {
  const isPsalms = b === 'psalms';
  const doneClass = isPsalms ? 'typed-psalms' : 'typed';
  const drafts = state.drafts[b][chapIdx] || {};
  const rows = document.querySelectorAll('#originalVerses .verse-row');
  rows.forEach((row, i) => {
    const text = (drafts[i] || '').trim();
    row.classList.remove('typed', 'typed-psalms');
    if (text.length > 0) row.classList.add(doneClass);
  });
}

// 현재 포커스된 절을 원문에서 하이라이트
function updateActiveVerse(verseIdx) {
  const rows = document.querySelectorAll('#originalVerses .verse-row');
  rows.forEach((row, i) => {
    row.classList.toggle('active-verse', i === verseIdx);
    // active 절이 원문 패널 안에서 보이도록 스크롤
    if (i === verseIdx) {
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
}

// ══════════════════════════
// COMPLETE
// ══════════════════════════
function completeChapter() {
  const b = state.book;
  const idx = state.chapIdx[b];
  const todayStr = today();

  if (state.done[b][idx]) {
    showToast('이미 완료된 장입니다 ✓');
    return;
  }

  state.done[b][idx] = todayStr;

  // Streak
  const last = state.lastDate;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
  if (last === yStr) state.streak += 1;
  else if (last !== todayStr) state.streak = 1;
  state.lastDate = todayStr;

  save();
  renderChapterList();
  renderChapter();
  showToast('완료! 오늘도 말씀 필사를 마쳤습니다 🙏');
}

// ══════════════════════════
// NAVIGATE CHAPTER
// ══════════════════════════
function moveChapter(dir) {
  const b = state.book;
  const len = BIBLE[b].length;
  state.chapIdx[b] = Math.max(0, Math.min(len - 1, state.chapIdx[b] + dir));
  save();
  renderChapterList();
  renderChapter();
}

// ══════════════════════════
// SYNC SCROLL
// ══════════════════════════
const pOrig = document.getElementById('paneOriginal');
const pWrite = document.getElementById('paneWriting');
let syncing = false;

pOrig.addEventListener('scroll', () => {
  if (!syncScroll || syncing) return;
  syncing = true;
  const ratio = pOrig.scrollTop / (pOrig.scrollHeight - pOrig.clientHeight);
  pWrite.scrollTop = ratio * (pWrite.scrollHeight - pWrite.clientHeight);
  syncing = false;
});

pWrite.addEventListener('scroll', () => {
  if (!syncScroll || syncing) return;
  syncing = true;
  const ratio = pWrite.scrollTop / (pWrite.scrollHeight - pWrite.clientHeight);
  pOrig.scrollTop = ratio * (pOrig.scrollHeight - pOrig.clientHeight);
  syncing = false;
});

// Toggle sync
document.querySelector('.sync-toggle').addEventListener('click', () => {
  syncScroll = !syncScroll;
  document.getElementById('syncBox').textContent = syncScroll ? '✓' : '';
  document.getElementById('syncBox').style.color = syncScroll ? 'var(--red)' : 'transparent';
});

// ══════════════════════════
// STATS
// ══════════════════════════
function updateStats() {
  const b = state.book;
  const total = BIBLE[b].length;
  const done = Object.keys(state.done[b]).length;
  document.getElementById('statStreak').textContent = state.streak;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;
}

// ══════════════════════════
// TOAST
// ══════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════
// RESET
// ══════════════════════════
function confirmReset() {
  document.getElementById('resetModal').classList.add('show');
}

function closeModal() {
  document.getElementById('resetModal').classList.remove('show');
}

function doReset() {
  state = fresh();
  save();
  closeModal();
  document.querySelector('.book-tab.proverbs').classList.add('active');
  document.querySelector('.book-tab.psalms').classList.remove('active');
  renderChapterList();
  renderChapter();
  showToast('초기화되었습니다. 새로 시작합니다 📖');
}

document.getElementById('resetModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ══════════════════════════
// INIT (Firebase 인증 후 _initApp 에서 처리)
// ══════════════════════════
</script>
